name: platform_sdk_verify

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  platform_sdk_verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Verify platform SDK packages
        run: bash tool/platform_sdk_verify.sh
