name: xsoulspace_logger_io
description: Durable dart:io sink for xsoulspace_logger with NDJSON segments, crash recovery, retention, and rotation.
version: 1.0.0-beta.0
homepage: https://github.com/xsoulspace/dart_flutter_packages/tree/main/pkgs/xsoulspace_logger_io
repository: https://github.com/xsoulspace/dart_flutter_packages
issue_tracker: https://github.com/xsoulspace/dart_flutter_packages/issues
documentation: https://github.com/xsoulspace/dart_flutter_packages/tree/main/pkgs/xsoulspace_logger_io
topics: [logging, observability, dart, io, ndjson]

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  xsoulspace_logger:
    hosted:
      name: xsoulspace_logger
      url: https://pub.xsoulspace.dev
    version: ^1.0.0-beta.0
dev_dependencies:
  lints: ^6.0.0
  test: ^1.24.0
  xsoulspace_lints: ^0.1.2
