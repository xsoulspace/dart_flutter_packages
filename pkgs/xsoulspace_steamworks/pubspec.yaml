name: xsoulspace_steamworks
description: Steamworks desktop wrapper for Dart and Flutter with lifecycle and v1 User/Friends/Stats/Achievements services.
version: 0.1.0
repository: https://github.com/xsoulspace/dart_flutter_packages
homepage: https://github.com/xsoulspace/dart_flutter_packages/tree/main/pkgs/xsoulspace_steamworks
issue_tracker: https://github.com/xsoulspace/dart_flutter_packages/issues

topics:
  - steam
  - steamworks
  - desktop
  - flutter
  - xsoulspace

platforms:
  windows:
  macos:
  linux:

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  ffi: ^2.1.4
  meta: ^1.16.0
  xsoulspace_steamworks_raw: 0.1.0

dev_dependencies:
  fake_async: ^1.3.3
  lints: ^6.0.0
  test: ^1.26.3
  xsoulspace_lints: ^0.1.2

dependency_overrides:
  xsoulspace_steamworks_raw:
    path: ../xsoulspace_steamworks_raw
